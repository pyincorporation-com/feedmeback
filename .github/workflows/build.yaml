name: Build and Push SSR Docker Image of feedmeback

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: "20"

      - name: Set up pip3
        run: |
          sudo apt-get update && sudo apt-get install -y python3-pip

      - name: Install Namespaxe
        run: |
          pip3 install namespaxe

      - name: Install dependencies
        run: |
          for i in {1..5}; do
            npm install --legacy-peer-deps && break || sleep 15;
          done

      - name: Build static project
        run: npm run build

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DCK_USERNAME }}
          password: ${{ secrets.DCK_PASSWORD }}

      - name: Set Docker image tag
        id: vars
        run: |
          echo "IMAGE_TAG=${GITHUB_SHA::7}" >> $GITHUB_ENV

      - name: Build and push Docker image
        uses: docker/build-push-action@v4
        with:
          context: .
          push: true
          tags: ${{ secrets.DCK_USERNAME }}/pyinc:feedmeback-frontend-0.0.0

      - name: Namespaxe login
        env:
          NAMESPAXE_USERNAME: ${{ secrets.NAMESPAXE_USERNAME }}
          NAMESPAXE_PASSWORD: ${{ secrets.NAMESPAXE_PASSWORD }}
        run: |
          namespaxe login --username "${{ secrets.NAMESPAXE_USERNAME }}" --password "${{ secrets.NAMESPAXE_PASSWORD }}"

      - name: Install Kubernetes configuration
        run: |
          namespaxe config ns feedmeback-1774191557-zmzn1t

      - name: Install kubectl
        run: |
          curl -LO "https://storage.googleapis.com/kubernetes-release/release/$(curl -s https://storage.googleapis.com/kubernetes-release/release/stable.txt)/bin/linux/amd64/kubectl"
          chmod +x ./kubectl
          sudo mv ./kubectl /usr/local/bin/kubectl

      - name: Deploy the app to Kubernetes
        run: |
          kubectl apply -f k8s/deployment.yaml
          kubectl rollout status deployment/feedmeback --timeout=220s
